name: Deploy SeshGuard to Azure App Service

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

concurrency:
  group: seshguard-production-deploy
  cancel-in-progress: true

env:
  AZURE_WEBAPP_NAME: seshguard
  AZURE_WEBAPP_PACKAGE_PATH: .azure-deploy
  AZURE_WEBAPP_PACKAGE_ZIP: seshguard-azure-deploy.zip
  NODE_VERSION: 22.x

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://www.seshguard.newpsychonaut.com

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run smoke tests
        run: npm test

      - name: Run typecheck
        run: npm run lint

      - name: Build production assets
        run: npm run build

      - name: Assemble Azure deployment package
        run: npm run package:azure

      - name: Create deployable zip artifact
        run: |
          rm -f "${{ env.AZURE_WEBAPP_PACKAGE_ZIP }}"
          cd "${{ env.AZURE_WEBAPP_PACKAGE_PATH }}"
          zip -qr "../${{ env.AZURE_WEBAPP_PACKAGE_ZIP }}" .

      - name: Verify packaged runtime dependencies
        run: |
          unzip -l "${{ env.AZURE_WEBAPP_PACKAGE_ZIP }}" | grep 'node_modules/dotenv/package.json'

      - name: Resolve Azure deployment authentication
        id: azure-auth
        env:
          AZURE_WEBAPP_PUBLISH_PROFILE: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
        run: |
          if [ -n "$AZURE_CLIENT_ID" ] && [ -n "$AZURE_TENANT_ID" ] && [ -n "$AZURE_SUBSCRIPTION_ID" ]; then
            echo "auth_mode=oidc" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [ -n "$AZURE_CLIENT_ID$AZURE_TENANT_ID$AZURE_SUBSCRIPTION_ID" ]; then
            echo "::error::OIDC auth is only partially configured. Set all of AZURE_CLIENT_ID, AZURE_TENANT_ID, and AZURE_SUBSCRIPTION_ID, or remove the partial values and use AZURE_WEBAPP_PUBLISH_PROFILE instead."
            exit 1
          fi

          if [ -z "$AZURE_WEBAPP_PUBLISH_PROFILE" ]; then
            echo "::error::Missing Azure deployment credentials. Configure AZURE_CLIENT_ID, AZURE_TENANT_ID, and AZURE_SUBSCRIPTION_ID for OIDC (recommended), or add AZURE_WEBAPP_PUBLISH_PROFILE as a fallback."
            exit 1
          fi

          case "$AZURE_WEBAPP_PUBLISH_PROFILE" in
            *"<publishData"*|*"<publishProfile"*)
              echo "auth_mode=publish-profile" >> "$GITHUB_OUTPUT"
              ;;
            *)
              echo "::error::AZURE_WEBAPP_PUBLISH_PROFILE is present but does not look like a valid App Service publish profile XML. Re-download the publish profile from Azure Portal and update the secret. For Linux App Service, set WEBSITE_WEBDEPLOY_USE_SCM=true before downloading if needed."
              exit 1
              ;;
          esac

      - name: Log in to Azure
        if: steps.azure-auth.outputs.auth_mode == 'oidc'
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy to Azure App Service with OIDC
        if: steps.azure-auth.outputs.auth_mode == 'oidc'
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          package: ${{ env.AZURE_WEBAPP_PACKAGE_ZIP }}

      - name: Deploy to Azure App Service with publish profile
        if: steps.azure-auth.outputs.auth_mode == 'publish-profile'
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: ${{ env.AZURE_WEBAPP_PACKAGE_ZIP }}
