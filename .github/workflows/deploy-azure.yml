name: Deploy SeshGuard to Azure App Service

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: seshguard-production-deploy
  cancel-in-progress: true

env:
  AZURE_WEBAPP_NAME: seshguard
  AZURE_WEBAPP_PACKAGE_PATH: .azure-deploy
  NODE_VERSION: 22.x

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://www.seshguard.newpsychonaut.com

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run smoke tests
        run: npm test

      - name: Run typecheck
        run: npm run lint

      - name: Build production assets
        run: npm run build

      - name: Assemble Azure deployment package
        run: npm run package:azure

      - name: Validate Azure publish profile secret
        env:
          AZURE_WEBAPP_PUBLISH_PROFILE: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
        run: |
          if [ -z "$AZURE_WEBAPP_PUBLISH_PROFILE" ]; then
            echo "::error::Missing GitHub secret AZURE_WEBAPP_PUBLISH_PROFILE. Add the App Service publish profile in repository or environment secrets before deploying."
            exit 1
          fi

      - name: Deploy to Azure App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: ${{ env.AZURE_WEBAPP_PACKAGE_PATH }}
